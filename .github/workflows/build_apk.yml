name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '11'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: 'stable'

    - name: Decode keystore (if provided)
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        if [ -n "$KEYSTORE_BASE64" ]; then
          mkdir -p android/app
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
          echo "Keystore decoded to android/app/keystore.jks"
        else
          echo "No KEYSTORE_BASE64 provided — skipping keystore decode"
        fi

    - name: Create android/key.properties (if signing)
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      run: |
        if [ -n "$KEYSTORE_BASE64" ]; then
          cat > android/key.properties <<EOF
storePassword=${KEYSTORE_PASSWORD}
keyPassword=${KEY_PASSWORD}
keyAlias=${KEY_ALIAS}
storeFile=app/keystore.jks
EOF
          echo "Created android/key.properties"
        else
          echo "No KEYSTORE_BASE64 provided — skipping key.properties creation"
        fi

    - name: Install dependencies
      run: flutter pub get

    - name: Build APK (release)
      run: flutter build apk --release

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
